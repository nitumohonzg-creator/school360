<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - School360</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; display: flex; }
        
        /* Teacher Sidebar Theme (Purple/Blue) */
        .sidebar { width: 250px; background-color: #34495e; color: white; height: 100vh; padding-top: 20px; position: fixed; overflow-y: auto;}
        .sidebar h2 { text-align: center; color: #9b59b6; margin-bottom: 30px; }
        .sidebar h2 span { color: white; }
        .sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; font-size: 16px; border-bottom: 1px solid #2c3e50; }
        .sidebar a:hover { background-color: #2c3e50; }
        .logout-btn { background-color: #e74c3c; color: white; text-align: center; margin: 20px; padding: 10px; border-radius: 5px; cursor: pointer; display: block; text-decoration: none; }

        .main-content { margin-left: 250px; padding: 30px; width: 100%; box-sizing: border-box; }
        .header { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; border-left: 5px solid #9b59b6; }
        .header h1 { margin: 0; color: #333; font-size: 24px; }

        /* Dashboard Grid */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .box-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .box-container h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        /* Form & Tables */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #333; font-size: 14px;}
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit;}
        .btn-submit { background: #9b59b6; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 15px; font-size: 14px;}
        th { background-color: #f4f7f6; padding: 12px; border-bottom: 2px solid #ccc; color: #333; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #555; }
        .mark-input { width: 80px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Teacher<span>Portal</span></h2>
        <a href="#">🏠 Dashboard</a>
        <a href="#uploadSec">📂 Upload Assignment</a>
        <a href="#marksSec">📝 Update Marks</a>
        <a href="main-website.html" class="logout-btn">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Welcome, Teacher!</h1>
            <p style="margin: 5px 0 0 0; color: #777;">Manage your classes, assignments, and student grades here.</p>
        </div>

        <div class="dashboard-grid">
            <div class="box-container" id="uploadSec">
                <h3>📂 Post New Assignment</h3>
                <form id="assignmentForm" onsubmit="uploadAssignment(event)">
                    <div class="form-group">
                        <label>Assignment Title</label>
                        <input type="text" id="aTitle" placeholder="e.g., Chapter 1 Science Notes" required>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Target Class</label>
                            <select id="aClass" required>
                                <option value="Class 8">Class 8</option>
                                <option value="Class 9">Class 9</option>
                                <option value="Class 10">Class 10</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Due Date</label>
                            <input type="date" id="aDueDate" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Attach File (PDF, Image, DOC)</label>
                        <input type="file" id="aFile" required style="padding: 5px;">
                    </div>
                    <button type="submit" class="btn-submit" id="aBtn">Upload Assignment</button>
                </form>
            </div>

            <div class="box-container" id="marksSec" style="border-top: 4px solid #2980b9;">
                <h3>📝 Enter Student Marks</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <div class="form-group" style="flex: 1; margin:0;">
                        <label>Select Class</label>
                        <select id="markClass" onchange="loadStudentsForMarks()">
                            <option value="">-- Choose Class --</option>
                            <option value="Class 8">Class 8</option>
                            <option value="Class 9">Class 9</option>
                            <option value="Class 10">Class 10</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1; margin:0;">
                        <label>Exam Name</label>
                        <input type="text" id="examName" placeholder="e.g., Unit Test 1">
                    </div>
                </div>
                
                <div style="max-height: 300px; overflow-y: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Roll</th>
                                <th>Student Name</th>
                                <th>Marks Obtained</th>
                            </tr>
                        </thead>
                        <tbody id="marksTableBody">
                            <tr><td colspan="3" style="text-align: center; color:#888;">Select a class to load students.</td></tr>
                        </tbody>
                    </table>
                </div>
                <button class="btn-submit" onclick="saveAllMarks()" style="background-color: #2980b9; margin-top: 15px;">Save All Marks</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        // NAYA IMPORT: Firebase Storage (File upload ke liye)
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDg4HlG4M9lgqYSjV-fdqKacN94QNgfvOY",
            authDomain: "school360-9c832.firebaseapp.com",
            projectId: "school360-9c832",
            storageBucket: "school360-9c832.firebasestorage.app", // Yeh bucket file save karega
            messagingSenderId: "923777949473",
            appId: "1:923777949473:web:f90a784d9d5609a1616860"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app); // Storage shuru kiya

        // ==========================================
        // 1. ASSIGNMENT UPLOAD LOGIC (With Attachment)
        // ==========================================
        window.uploadAssignment = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('aBtn');
            const fileInput = document.getElementById('aFile');
            const file = fileInput.files[0];

            if(!file) { alert("Please select a file first!"); return; }

            btn.innerText = "Uploading File... Please Wait";
            
            try {
                // 1. File ko Firebase Storage mein bhejna
                const storageRef = ref(storage, 'assignments/' + new Date().getTime() + '_' + file.name);
                await uploadBytes(storageRef, file);
                
                // 2. File ka Download Link nikalna
                const downloadURL = await getDownloadURL(storageRef);

                // 3. Assignment ki details aur Link dono ko Database (Firestore) mein save karna
                await addDoc(collection(db, "assignments"), {
                    title: document.getElementById('aTitle').value,
                    className: document.getElementById('aClass').value,
                    dueDate: document.getElementById('aDueDate').value,
                    fileUrl: downloadURL, // Link yahan save hua
                    datePosted: new Date()
                });

                alert("Assignment Uploaded Successfully! Students can now see it.");
                document.getElementById('assignmentForm').reset();
            } catch (error) {
                alert("Upload failed! (Check Step 2 notes to enable Storage) Error: " + error.message);
            } finally {
                btn.innerText = "Upload Assignment";
            }
        }

        // ==========================================
        // 2. MARKS ENTRY LOGIC
        // ==========================================
        // Class select karne par students ki list laana
        window.loadStudentsForMarks = async function() {
            const selectedClass = document.getElementById('markClass').value;
            const tbody = document.getElementById('marksTableBody');
            
            if(!selectedClass) { tbody.innerHTML = '<tr><td colspan="3">Select class first</td></tr>'; return; }
            
            tbody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Loading students...</td></tr>';
            
            try {
                const q = query(collection(db, "students"), where("className", "==", selectedClass));
                const snapshot = await getDocs(q);
                
                if(snapshot.empty) { tbody.innerHTML = '<tr><td colspan="3">No students found in this class.</td></tr>'; return; }
                
                tbody.innerHTML = '';
                // Har student ke aage ek khali dabba (input) banayenge marks ke liye
                snapshot.forEach(doc => {
                    const s = doc.data();
                    tbody.innerHTML += `
                        <tr class="student-row" data-id="${doc.id}" data-name="${s.name}" data-roll="${s.rollNumber}">
                            <td>${s.rollNumber}</td>
                            <td>${s.name}</td>
                            <td><input type="number" class="mark-input" placeholder="00"></td>
                        </tr>
                    `;
                });
            } catch(error) { console.error(error); }
        }

        // Ek sath sabke marks save karna
        window.saveAllMarks = async function() {
            const exam = document.getElementById('examName').value;
            const selectedClass = document.getElementById('markClass').value;
            if(!exam || !selectedClass) { alert("Please enter Exam Name and select Class!"); return; }

            const rows = document.querySelectorAll('.student-row');
            let savedCount = 0;

            // Har row (student) ko check karke database mein bhejna
            for(let row of rows) {
                const studentId = row.getAttribute('data-id');
                const studentName = row.getAttribute('data-name');
                const marksObtained = row.querySelector('.mark-input').value;

                // Agar teacher ne marks bhare hain tabhi save karo
                if(marksObtained !== "") {
                    await addDoc(collection(db, "marks"), {
                        studentId: studentId,
                        studentName: studentName,
                        className: selectedClass,
                        examName: exam,
                        marks: marksObtained,
                        dateUploaded: new Date()
                    });
                    savedCount++;
                }
            }
            alert(`Success! Saved marks for ${savedCount} students.`);
            document.getElementById('examName').value = "";
            loadStudentsForMarks(); // Table refresh
        }
    </script>
</body>
</html>
