<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School360 - Admin Pro</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --danger: #c0392b; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; }
        
        /* Sidebar Fixes */
        .sidebar { width: 260px; background: var(--primary); color: white; height: 100vh; position: fixed; z-index: 1000; overflow-y: auto; transition: 0.3s; }
        .sidebar h2 { text-align: center; padding: 20px; color: var(--secondary); margin: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: white; text-decoration: none; cursor: pointer; border-bottom: 1px solid #34495e; font-size: 14px; }
        .sidebar a:hover, .sidebar a.active-link { background: var(--secondary); }
        
        /* Layout Fixes */
        .main-content { margin-left: 260px; padding: 20px; width: calc(100% - 260px); }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; }
        }

        .box-container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        .btn { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <h2>School<span>360</span></h2>
        <a onclick="switchTab('dashboardSec')">📊 Dashboard</a>
        <a onclick="switchTab('classManageSec')">🏫 Manage Classes</a>
        <a onclick="switchTab('studentsSec')">🎓 Students DB</a>
        <a onclick="switchTab('financeSec')">💰 Finance & Fees</a>
        <a onclick="switchTab('hrSec')">👨‍💼 Staff & Salaries</a>
        <a onclick="switchTab('leaveReqSec')">📩 Leave Approvals</a>
        <a onclick="switchTab('examApprovalSec')">🏆 Exam Results</a>
        <a onclick="switchTab('timetableSec')">📅 Timetable</a>
        <a href="main-website.html" class="logout-btn">Logout</a>
    </div>

    <div class="main-content" id="content">
        <div id="dashboardSec" class="content-section active">
            <div class="box-container">
                <h3>System Overview</h3>
                <div id="statsGrid" style="display:flex; gap:20px;">
                    <div class="card"><h2>0</h2><p>Students</p></div>
                    <div class="card"><h2>0</h2><p>Teachers</p></div>
                </div>
            </div>
        </div>

        <div id="studentsSec" class="content-section">
            <div class="box-container">
                <h3>🎓 Student Database</h3>
                <table id="studentsTable">
                    <thead><tr><th>Roll</th><th>Name</th><th>Class</th><th>Details</th><th>Actions</th></tr></thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>

        <div id="financeSec" class="content-section">
            <div class="box-container">
                <h3>💰 Fee Structure Setup</h3>
                <div id="feeRows">
                    <div class="grid-3" id="feeInputArea">
                        <input type="text" id="feeName" placeholder="Fee Name (e.g. Bus Fee)">
                        <input type="number" id="feeAmount" placeholder="Amount">
                        <button class="btn" onclick="addFeeField()">+ Add to List</button>
                    </div>
                </div>
                <table id="feeListTable">
                    <thead><tr><th>Fee Type</th><th>Amount</th><th>Action</th></tr></thead>
                    <tbody id="feeListBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const db = getFirestore(initializeApp({ /* Config */ }));

        // 1. Dynamic Fee Structure Logic
        window.addFeeField = async () => {
            const name = document.getElementById('feeName').value;
            const amt = document.getElementById('feeAmount').value;
            if(!name || !amt) return alert("Fill fee details");
            
            await addDoc(collection(db, "fee_structures"), { name, amount: parseInt(amt) });
            loadFeeList();
        }

        window.loadFeeList = async () => {
            const snap = await getDocs(collection(db, "fee_structures"));
            const tbody = document.getElementById('feeListBody');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const f = d.data();
                tbody.innerHTML += `<tr><td>${f.name}</td><td>₹${f.amount}</td><td><button class="btn btn-danger" onclick="deleteDoc(doc(db, 'fee_structures', '${d.id}')); loadFeeList();">Del</button></td></tr>`;
            });
        }

        // 2. Student Promotion/TC/Details Logic
        window.promoteStudent = async (id, currentClass) => {
            let nextClass = prompt("Enter next class:", parseInt(currentClass) + 1);
            if(nextClass) {
                await updateDoc(doc(db, "students", id), { className: nextClass });
                loadStudents();
            }
        }

        window.issueTC = async (id) => {
            if(confirm("Issue TC? Student will be marked as Inactive.")) {
                await updateDoc(doc(db, "students", id), { status: "Inactive" });
                loadStudents();
            }
        }

        // 3. UI Helper
        window.switchTab = (id) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Initialization
        window.onload = () => {
            loadFeeList();
            // loadStudents(); // Call your existing functions here
        }
    </script>
</body>
</html>
