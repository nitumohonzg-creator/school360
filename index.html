<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Dashboard - School360</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; display: flex; }
        
        /* Sidebar Styling */
        .sidebar { width: 250px; background-color: #2c3e50; color: white; height: 100vh; padding-top: 20px; position: fixed; }
        .sidebar h2 { text-align: center; color: #3498db; margin-bottom: 30px; }
        .sidebar h2 span { color: white; }
        .sidebar a { display: block; color: white; padding: 15px 25px; text-decoration: none; font-size: 16px; border-bottom: 1px solid #34495e; }
        .sidebar a:hover { background-color: #34495e; }
        .logout-btn { background-color: #e74c3c; color: white; text-align: center; margin: 20px; padding: 10px; border-radius: 5px; cursor: pointer; display: block; text-decoration: none; }

        /* Main Content Styling */
        .main-content { margin-left: 250px; padding: 30px; width: 100%; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .header h1 { margin: 0; color: #333; font-size: 24px; }

        /* Action Buttons */
        .action-cards { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex: 1; text-align: center; border-top: 5px solid #3498db; min-width: 250px; }
        .card h3 { color: #2c3e50; font-size: 22px; margin-top: 0; }
        .btn { background-color: #3498db; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 15px; }

        /* Data Table Styling */
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow-x: auto; }
        .table-container h3 { margin-top: 0; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #f4f7f6; padding: 12px; border-bottom: 2px solid #ccc; color: #333; }
        td { padding: 12px; border-bottom: 1px solid #eee; color: #555; }

        /* Modals (Popups) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 30px; border-radius: 10px; width: 350px; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 500; color: #333;}
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #2ecc71; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>School<span>360</span></h2>
        <a href="#">📊 Dashboard</a>
        <a href="#">👨‍🏫 Manage Teachers</a>
        <a href="#">🎓 Manage Students</a>
        <a href="main-website.html" class="logout-btn">Logout</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Admin Dashboard</h1>
            <p>Welcome to School Control Panel</p>
        </div>

        <div class="action-cards">
            <div class="card">
                <h3>👨‍🏫 Teachers</h3>
                <button class="btn" onclick="openTeacherModal()">+ Add New Teacher</button>
            </div>
            <div class="card" style="border-top-color: #2ecc71;">
                <h3>🎓 Students</h3>
                <button class="btn" style="background-color: #2ecc71;" onclick="openStudentModal()">+ Add New Student</button>
            </div>
        </div>

        <div class="table-container">
            <h3>🎓 Registered Students List</h3>
            <table>
                <thead>
                    <tr>
                        <th>Roll Number</th>
                        <th>Student Name</th>
                        <th>Class</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <tr><td colspan="3" style="text-align: center;">Loading students from Firebase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="teacherModal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeTeacherModal()">&times;</span>
            <h3 style="margin-top: 0;">Add Teacher Details</h3>
            <form id="teacherForm" onsubmit="addTeacher(event)">
                <div class="form-group"><label>Teacher Name</label><input type="text" id="tName" required></div>
                <div class="form-group"><label>Subject</label><input type="text" id="tSubject" required></div>
                <div class="form-group"><label>Phone Number</label><input type="number" id="tPhone" required></div>
                <button type="submit" class="submit-btn" id="tBtn">Save Teacher</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="studentModal">
        <div class="modal-box">
            <span class="close-btn" onclick="closeStudentModal()">&times;</span>
            <h3 style="margin-top: 0;">Add Student Details</h3>
            <form id="studentForm" onsubmit="addStudent(event)">
                <div class="form-group"><label>Student Name</label><input type="text" id="sName" required></div>
                <div class="form-group"><label>Class</label><input type="text" id="sClass" required></div>
                <div class="form-group"><label>Roll Number</label><input type="number" id="sRoll" required></div>
                <button type="submit" class="submit-btn" id="sBtn">Save Student</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        // getDocs ko import list mein add kiya gaya hai
        import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDg4HlG4M9lgqYSjV-fdqKacN94QNgfvOY",
            authDomain: "school360-9c832.firebaseapp.com",
            projectId: "school360-9c832",
            storageBucket: "school360-9c832.firebasestorage.app",
            messagingSenderId: "923777949473",
            appId: "1:923777949473:web:f90a784d9d5609a1616860"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Modals ko Open/Close karne ke functions
        window.openTeacherModal = () => document.getElementById('teacherModal').style.display = 'flex';
        window.closeTeacherModal = () => document.getElementById('teacherModal').style.display = 'none';
        window.openStudentModal = () => document.getElementById('studentModal').style.display = 'flex';
        window.closeStudentModal = () => document.getElementById('studentModal').style.display = 'none';

        // ==========================================
        // Firebase se Data laane ka NAYA function
        // ==========================================
        window.loadStudents = async function() {
            const tableBody = document.getElementById('studentTableBody');
            
            try {
                const querySnapshot = await getDocs(collection(db, "students"));
                
                if (querySnapshot.empty) {
                    tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center;">Abhi tak koi student add nahi hua hai.</td></tr>';
                    return;
                }

                // Table ko khali karein taaki naya data dikhe
                tableBody.innerHTML = ''; 

                // Har ek student ke liye naya table row (tr) banayein
                querySnapshot.forEach((doc) => {
                    const student = doc.data();
                    const row = `<tr>
                        <td>${student.rollNumber}</td>
                        <td>${student.name}</td>
                        <td>${student.className}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Error fetching data: ", error);
                tableBody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: red;">Data load hone mein error aaya!</td></tr>';
            }
        }

        // Jaise hi page khulega, loadStudents() automatically chal jayega
        window.onload = function() {
            loadStudents();
        }

        // Add Teacher Logic
        window.addTeacher = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('tBtn');
            btn.innerText = "Saving...";
            try {
                await addDoc(collection(db, "teachers"), {
                    name: document.getElementById('tName').value,
                    subject: document.getElementById('tSubject').value,
                    phone: document.getElementById('tPhone').value,
                    dateAdded: new Date()
                });
                alert("Teacher add ho gaye hain.");
                document.getElementById('teacherForm').reset();
                window.closeTeacherModal();
            } catch (error) { alert("Error: " + error.message); } 
            finally { btn.innerText = "Save Teacher"; }
        }

        // Add Student Logic
        window.addStudent = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('sBtn');
            btn.innerText = "Saving...";
            try {
                await addDoc(collection(db, "students"), {
                    name: document.getElementById('sName').value,
                    className: document.getElementById('sClass').value,
                    rollNumber: document.getElementById('sRoll').value,
                    dateAdded: new Date()
                });
                alert("Student add ho gaya hai!");
                document.getElementById('studentForm').reset();
                window.closeStudentModal();
                
                // Jaise hi naya student add ho, table ko refresh kar do
                loadStudents(); 
                
            } catch (error) { alert("Error: " + error.message); } 
            finally { btn.innerText = "Save Student"; }
        }
    </script>
</body>
</html>
